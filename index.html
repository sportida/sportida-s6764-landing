<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sportida</title>
    <meta name="description" content="Sportida home. Choose where to continue.">
    <meta name="robots" content="index,follow">
    <link rel="canonical" href="https://sportida.store/">
    <style>
      :root {
        color-scheme: light;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        display: grid;
        place-items: center;
        background: #f6f7f9;
        color: #0f172a;
      }
      main {
        width: min(560px, 92vw);
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 28px;
        text-align: center;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 1.8rem;
      }
      p {
        margin: 0 0 22px;
        color: #475569;
      }
      .actions {
        display: grid;
        gap: 12px;
      }
      a {
        display: inline-block;
        text-decoration: none;
        padding: 12px 16px;
        border-radius: 8px;
        border: 1px solid #cbd5e1;
        color: #0f172a;
        font-weight: 700;
      }
      a:hover { background: #f8fafc; }
      .primary {
        background: #0f172a;
        color: #fff;
        border-color: #0f172a;
      }
      .primary:hover { background: #1e293b; }
    </style>
  </head>
  <body>
    <main>
      <h1>Sportida</h1>
      <p>Select where you want to go.</p>
      <div class="actions">
        <a class="primary" href="/s6764/">Open S6764 Landing</a>
        <a href="/blog/">Open Blog</a>
      </div>
    </main>
  </body>
</html>
